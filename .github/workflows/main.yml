name: TMAX Signal Bot

on:
  schedule:
    # 1. One update at Midnight (12:00 AM PDT)
    - cron: '0 7 * * *'
    
    # 2. Every 30 mins from 6:00 AM to 8:00 AM PDT
    - cron: '0,30 13-14 * * *'
    
    # 3. Every 15 mins from 8:00 AM to 11:45 PM PDT
    - cron: '*/15 15-23,0-6 * * *'
    
  workflow_dispatch: # Allows manual trigger

permissions:
  contents: write # Global permission for the bot to write to the repo

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run bot
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: python bot.py

      - name: Commit and push updated CSV log
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tmax_log.csv
          git commit -m "chore: update tmax_log [skip ci]" || exit 0
          git pull --rebase origin main
          git push origin main
