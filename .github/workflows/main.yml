name: TMAX Signal Bot

on:
  schedule:
    # Off-peak minutes: avoids top-of-hour GitHub Actions queue congestion
    - cron: '3,18,33,48 * * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run bot
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: python main.py

      - name: Commit updated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tmax_log.csv last_signal.json warning_state.json
          git diff --cached --quiet || git commit -m "chore: tmax bot update [skip ci]"
          git push
